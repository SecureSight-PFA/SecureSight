apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources: 
  - ../../base
  - storageclass-gp3.yaml

patches: 
  - path: ingress-patch.yaml #replace nginx ingress with alb ingress
  - path: statefulset-storage-patch.yaml
  - path: netpol-alb-patch.yaml

secretGenerator:
  - name: mongodb-creds
    namespace: sock-shop
    envs:
      - env.secret
