apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: orders-db
  labels:
    name: orders-db
  namespace: sock-shop
spec:
  serviceName: orders-db
  replicas: 1
  selector:
    matchLabels:
      name: orders-db
  template:
    metadata:
      labels:
        name: orders-db
    spec:
      containers:
        - name: orders-db
          image: quay.io/mongodb/mongodb:org-4.4-standalone-ubuntu2204
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongo
              containerPort: 27017
          securityContext:
            readOnlyRootFilesystem: false
              
          volumeMounts:
            - mountPath: /tmp
              name: orders-db-temp-vol
            - mountPath: /data/db
              name: orders-db-data # the durable data volume
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsGroup: 999

      nodeSelector:
        node-role.kubernetes.io/worker: ""
        kubernetes.io/arch: amd64

  volumeClaimTemplates:
    - metadata:
        name: orders-db-temp-vol
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
        storageClassName: standard

    - metadata:
        name: orders-db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi 
        storageClassName: standard