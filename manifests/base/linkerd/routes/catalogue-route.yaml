apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: catalogue-route
  namespace: sock-shop
  annotations:
    # All catalogue endpoints are read-only (safe to retry)
    retry.linkerd.io/http: "5xx,reset"
    retry.linkerd.io/limit: "3"
    retry.linkerd.io/timeout: "200ms"
spec:
  parentRefs:
    - name: catalogue
      kind: Service
      port: 80
  rules:
    # GET /catalogue - browse products
    - matches:
        - path:
            type: PathPrefix
            value: /catalogue
          method: GET
      timeouts:
        request: 3s
    
    # GET /catalogue/{id} - specific product
    - matches:
        - path:
            type: RegularExpression
            value: /catalogue/[^/]+
          method: GET
      timeouts:
        request: 3s
    
    # GET /tags - product categories
    - matches:
        - path:
            type: Exact
            value: /tags
          method: GET
      timeouts:
        request: 3s