# Source: https://github.com/kubernetes/autoscaler/blob/master/cluster-autoscaler/charts/cluster-autoscaler/values.yaml

autoDiscovery:
  clusterName: securesight-dev-eks

awsRegion: us-east-2

image:
  tag: v1.33.0

rbac:
  serviceAccount:
    name: cluster-autoscaler

resources:
  limits:
    cpu: 100m
    memory: 300Mi
  requests:
    cpu: 100m
    memory: 300Mi

extraArgs:
  expander: least-waste

# We'll need this after we install Prometheus
#serviceMonitor:
#  enabled: true
#  namespace: monitoring

# Then apply it:
# helm repo add autoscaler https://kubernetes.github.io/autoscaler
# helm repo update
# helm upgrade --install cluster-autoscaler autoscaler/cluster-autoscaler \
#   --namespace kube-system \
#   --create-namespace \
#   --values manifests/base/microservices/cluster-autoscaler/cluster-autoscaler-values.yaml
