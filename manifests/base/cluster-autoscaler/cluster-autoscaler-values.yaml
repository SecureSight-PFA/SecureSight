# Source: https://github.com/kubernetes/autoscaler/blob/master/cluster-autoscaler/charts/cluster-autoscaler/values.yaml

autoDiscovery:
  clusterName: securesight-dev-eks

awsRegion: us-east-2

image:
  tag: v1.33.0

rbac:
  serviceAccount:
    name: cluster-autoscaler

resources:
  limits:
    cpu: 100m
    memory: 300Mi
  requests:
    cpu: 100m
    memory: 300Mi

extraArgs:
  expander: least-waste

# We'll need this after we install Prometheus
#serviceMonitor:
#  enabled: true
#  namespace: monitoring

# Then apply it:
# helm repo add autoscaler https://kubernetes.github.io/autoscaler
# helm repo update
# helm upgrade --install cluster-autoscaler autoscaler/cluster-autoscaler --namespace kube-system --values cluster-autoscaler-values.yaml

# To verify that cluster-autoscaler has started, run:
# kubectl --namespace=kube-system get pods -l "app.kubernetes.io/name=aws-cluster-autoscaler,app.kubernetes.io/instance=cluster-autoscaler"
