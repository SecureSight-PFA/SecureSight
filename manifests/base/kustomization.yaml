apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: sock-shop
  namespace: sock-shop

sortOptions:
  order: fifo

resources:
  - sock-shop-ns.yaml
  - front-end/
  - carts/
  - catalogue/
  - user/
  - orders/
  - payment/
  - queue-master/
  - rabbitmq/
  - session/
  - shipping/
  - networking/
