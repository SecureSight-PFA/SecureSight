---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  labels:
    name: catalogue
  namespace: sock-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      name: catalogue
  template:
    metadata:
      labels:
        name: catalogue
    spec:
      serviceAccountName: catalogue-sa
      containers:
        - name: catalogue
          image: quay.io/powercloud/sock-shop-catalogue:latest
          imagePullPolicy: IfNotPresent
          
          envFrom:
            - secretRef:
                name: catalogue-db-secret


          command: [ "/opt/app" ]
          args:
            - -port=8080
            #- -DSN=root:admin@tcp(catalogue-db:3306)/socksdb
            - -DSN=$(MARIADB_USER):$(MARIADB_PASSWORD)@tcp(catalogue-db:3306)/$(MARIADB_DATABASE)
          resources:
            limits:
              cpu: 200m
              memory: 200Mi
            requests:
              cpu: 100m
              memory: 100Mi
          ports:
            - containerPort: 8080
          securityContext:
            #runAsNonRoot: true
            capabilities:
              drop:
                - all
            readOnlyRootFilesystem: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 300
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 3
      nodeSelector:
        node-role.kubernetes.io/worker: ""
