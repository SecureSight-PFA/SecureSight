apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: monitoring
  name: monitoring-admin
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sre-monitoring-admin
  namespace: monitoring
subjects:
  - kind: Group
    name: sre    ###
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: monitoring-admin
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: security
  name: security-readonly
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sre-security-readonly
  namespace: security
subjects:
  - kind: Group
    name: sre     ###
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: security-readonly
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: linkerd
  name: linkerd-admin
rules:
  - apiGroups: ["", "apps", "policy.linkerd.io", "linkerd.io"]
    resources: ["*"]
    verbs: ["*"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sre-linkerd-admin
  namespace: linkerd
subjects:
  - kind: Group
    name: sre   ###
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: linkerd-admin
  apiGroup: rbac.authorization.k8s.io