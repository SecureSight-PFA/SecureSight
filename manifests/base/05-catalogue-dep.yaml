---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  labels:
    name: catalogue
  namespace: sock-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      name: catalogue
  template:
    metadata:
      labels:
        name: catalogue
    spec:
      initContainers:
      - name: wait-for-catalogue-db
        image: busybox:1.28
        command: 
        - sh
        - -c
        - |
          echo "Waiting for catalogue-db to be ready..."
          until nc -z catalogue-db 3306; do
            sleep 2
          done
          echo "catalogue-db is ready!"
      containers:
        - name: catalogue
          image: quay.io/powercloud/sock-shop-catalogue:latest
          imagePullPolicy: IfNotPresent
          command: [ "/opt/app" ]
          args:
          - -port=8080
          - -DSN=root:$(MYSQL_ROOT_PASSWORD)@tcp(catalogue-db:3306)/socksdb
          env:
          - name: MYSQL_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mongodb-creds
                key: MYSQL_ROOT_PASSWORD
          resources:
            limits:
              cpu: 200m
              memory: 200Mi
            requests:
              cpu: 100m
              memory: 100Mi
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 3