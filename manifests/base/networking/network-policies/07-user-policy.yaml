apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-user
  namespace: sock-shop
spec:
  podSelector:
    matchLabels:
      name: user
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          name: front-end
    ports:
    - port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-user-to-db
  namespace: sock-shop
spec:
  podSelector:
    matchLabels:
      name: user
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          name: user-db
    ports:
    - port: 27017
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-user-db-ingress
  namespace: sock-shop
spec:
  podSelector:
    matchLabels:
      name: user-db
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          name: user
    ports:
    - port: 27017