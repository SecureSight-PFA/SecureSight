apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sock-shop-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - sock-shop
  selector:
    matchLabels:
      monitor: "true"  ### in each service
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
