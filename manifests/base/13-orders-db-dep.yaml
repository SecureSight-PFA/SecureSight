apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-db
  labels:
    name: orders-db
  namespace: sock-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      name: orders-db
  template:
    metadata:
      labels:
        name: orders-db
    spec:
      containers:
        - name: orders-db
          image: quay.io/mongodb/mongodb:org-4.4-standalone-ubuntu2204
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongo
              containerPort: 27017
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          securityContext:
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /tmp
              name: orders-db-temp-vol
            - mountPath: /data/db
              name: orders-db-vol
      volumes:
        - name: orders-db-vol
          emptyDir:
            medium: Memory
        - name: orders-db-temp-vol
          persistentVolumeClaim:
            claimName: orders-db-temp-pvc
      #nodeSelector:
      #  node-role.kubernetes.io/worker: ""
      #  kubernetes.io/arch: amd64