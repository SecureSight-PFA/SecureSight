apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-orders
  namespace: sock-shop
spec:
  podSelector:
    matchLabels:
      name: orders
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          name: front-end
    ports:
    - port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-orders-to-db
  namespace: sock-shop
spec:
  podSelector:
    matchLabels:
      name: orders
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          name: orders-db
    ports:
    - port: 27017
  - to:
    - podSelector:
        matchLabels:
          name: rabbitmq
    ports:
    - port: 5672
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-orders-db-ingress
  namespace: sock-shop
spec:
  podSelector:
    matchLabels:
      name: orders-db
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          name: orders
    ports:
    - port: 27017