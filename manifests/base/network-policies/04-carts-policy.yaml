apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-carts
  namespace: sock-shop
spec:
  podSelector:
    matchLabels:
      name: carts
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          name: front-end
    ports:
    - port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-carts-to-db
  namespace: sock-shop
spec:
  podSelector:
    matchLabels:
      name: carts
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          name: carts-db
    ports:
    - port: 27017
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-carts-db-ingress
  namespace: sock-shop
spec:
  podSelector:
    matchLabels:
      name: carts-db
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          name: carts
    ports:
    - port: 27017