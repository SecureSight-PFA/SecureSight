apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: front-end-hpa
  namespace: sock-shop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: front-end        
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 65
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30    
      policies:
      - type: Pods
        value: 2                         
        periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 180   
      policies:
      - type: Pods
        value: 1                         
        periodSeconds: 60