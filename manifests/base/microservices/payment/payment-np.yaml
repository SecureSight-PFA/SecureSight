apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payment-access
  namespace: sock-shop
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: payment
      policyTypes:
        - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              name: orders
      ports:
        - protocol: TCP
          port: 8080