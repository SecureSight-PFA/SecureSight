apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payment-access
  namespace: sock-shop
spec:
  podSelector:
    matchLabels:
      name: payment
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          name: orders
    - podSelector:
        matchLabels:
          name: front-end
    ports:
    - protocol: TCP
      port: 80