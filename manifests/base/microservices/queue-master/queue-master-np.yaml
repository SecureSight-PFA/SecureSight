apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: queue-master-access
  namespace: sock-shop
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: queue-master

  policyTypes:
    - Ingress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: shipping
        - podSelector:
            matchLabels:
              app: orders
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - protocol: TCP
          port: 8080