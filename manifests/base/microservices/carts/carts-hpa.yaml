# Documentation: https://kubernetes.io/docs/concepts/workloads/autoscaling/horizontal-pod-autoscale/

apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: carts
  namespace: sock-shop
spec:
  scaleTargetRef:
    apiVersion: apps/v1beta1
    kind: Deployment
    name: carts
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 80