apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cart-access
  namespace: sock-shop
spec:
  podSelector:
    matchLabels:
      app: carts   

  policyTypes:
  - Ingress        

  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: front-end   
    - podSelector:
        matchLabels:
          app: orders      

    ports:
    - protocol: TCP
      port: 8080