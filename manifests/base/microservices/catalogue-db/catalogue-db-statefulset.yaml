apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: catalogue-db
  namespace: sock-shop
  labels:
    name: catalogue-db
spec:
  serviceName: "catalogue-db"
  replicas: 1
  selector:
    matchLabels:
      name: catalogue-db
  template:
    metadata:
      labels:
        name: catalogue-db
      # This tells Linkerd to let MongoDB traffic pass through without intercepting it
      annotations:
        config.linkerd.io/skip-outbound-ports: "3306"
    spec:
      serviceAccountName: db-sa
      securityContext:
        fsGroup: 999
      containers:
        - name: catalogue-db
          image: quay.io/powercloud/sock-shop-catalogue-db:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              export MARIADB_ROOT_PASSWORD=$(cat /mnt/secrets/password)
              exec docker-entrypoint.sh mariadbd
          env:
            - name: MARIADB_USER
              value: root
            - name: MARIADB_DATABASE
              value: socksdb
          ports:
            - name: mysql
              containerPort: 3306
          volumeMounts:
            - name: catalogue-data
              mountPath: /var/lib/mysql
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
          securityContext:
            runAsUser: 0
            privileged: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - SETGID
                - SETUID

      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: catalogue-db-spc

  volumeClaimTemplates:
    - metadata:
        name: catalogue-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ebs-sc
        resources:
          requests:
            storage: 1Gi